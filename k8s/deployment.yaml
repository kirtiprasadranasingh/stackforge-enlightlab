apiVersion: v1
kind: Namespace
metadata:
  name: stackforge
---
# ClusterIP only — do NOT create a second LoadBalancer (share the existing one via Ingress)
apiVersion: v1
kind: Service
metadata:
  name: stackforge
  namespace: stackforge
  labels:
    app: stackforge
spec:
  type: ClusterIP
  selector:
    app: stackforge
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stackforge
  namespace: stackforge
  labels:
    app: stackforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stackforge
  template:
    metadata:
      labels:
        app: stackforge
    spec:
      containers:
        - name: stackforge
          # Replace after OCIR push:
          # bom.ocir.io/<tenancy-namespace>/stackforge:latest
          image: <REGION_KEY>.ocir.io/<TENANCY_NAMESPACE>/stackforge:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: stackforge-secrets
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "500m"
              memory: 768Mi
      # Uncomment if OCIR repo is private
      # imagePullSecrets:
      #   - name: ocir-secret
