apiVersion: v1
kind: Namespace
metadata:
  name: stackforge
---
apiVersion: v1
kind: Service
metadata:
  name: stackforge
  namespace: stackforge
  labels:
    app: stackforge
spec:
  type: ClusterIP
  selector:
    app: stackforge
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stackforge
  namespace: stackforge
  labels:
    app: stackforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stackforge
  template:
    metadata:
      labels:
        app: stackforge
    spec:
      # Live image is on Docker Hub (OCIR free-tier push often 403).
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: stackforge
          image: docker.io/kirtiprasad2003/stackforge:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: stackforge-secrets
          env:
            - name: STACKFORGE_TF_PLUGIN_CACHE
              value: /tmp/stackforge-tf-plugin-cache
            - name: TF_PLUGIN_CACHE_DIR
              value: /tmp/stackforge-tf-plugin-cache
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            # Long terraform validate must NOT eject the pod from the Service (503).
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 5
            # ~10 minutes of blocked event-loop before kill (validate can be slow).
            failureThreshold: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 3Gi
            limits:
              cpu: "1000m"
              memory: 1.5Gi
              ephemeral-storage: 8Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 8Gi
