apiVersion: v1
kind: Namespace
metadata:
  name: stackforge
---
apiVersion: v1
kind: Service
metadata:
  name: stackforge
  namespace: stackforge
  labels:
    app: stackforge
spec:
  type: ClusterIP
  selector:
    app: stackforge
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stackforge
  namespace: stackforge
  labels:
    app: stackforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stackforge
  template:
    metadata:
      labels:
        app: stackforge
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: stackforge
          # Replace TENANCY_NAMESPACE after you check OCIR (see DEPLOY steps)
          image: bom.ocir.io/bmitpaosivqx/stackforge:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: stackforge-secrets
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1000m"
              memory: 1.5Gi
