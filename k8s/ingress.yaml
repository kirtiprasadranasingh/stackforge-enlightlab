# Shared existing LB (144.24.100.85) — host-based, same pattern as other enlightlab apps.
# URL: http://stackforge.144-24-100-85.nip.io
#
# No NEXT_BASE_PATH needed for this host style.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stackforge
  namespace: stackforge
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - stackforge.144-24-100-85.nip.io
      secretName: stackforge-tls
  rules:
    - host: stackforge.144-24-100-85.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stackforge
                port:
                  name: http
