# Shared LB (144.24.100.85) — host-based routing.
# HTTPS:
#   https://stackforge.enlightlab.com
#   https://stackforge.144-24-100-85.nip.io
#
# Requires cert-manager ClusterIssuer (default name: letsencrypt-prod).
# If your issuer differs: kubectl get clusterissuer
# Then edit the cert-manager.io/cluster-issuer annotation below.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stackforge
  namespace: stackforge
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # After the TLS secret is Ready, force HTTPS so Chrome shows a padlock
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Generation is SSE — default 60s proxy timeouts cause "Could not reach the API"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "12m"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - stackforge.enlightlab.com
        - stackforge.144-24-100-85.nip.io
      secretName: stackforge-tls
  rules:
    - host: stackforge.enlightlab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stackforge
                port:
                  name: http
    - host: stackforge.144-24-100-85.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stackforge
                port:
                  name: http
